<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1976d2" />
    <title>Neome Wizard</title>

    <!-- Google tag (gtag.js) — same GA4 property as the old wizard
         (measurement id G-DG89L8TY93); async so it never blocks first paint. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DG89L8TY93"></script>
    <script>
      window.dataLayer = window.dataLayer || [];

      function gtag() {
        dataLayer.push(arguments);
      }

      gtag("js", new Date());
      gtag("config", "G-DG89L8TY93");
    </script>
  </head>
  <body>
    <!-- Keep #root non-empty: Safari holds first paint while the page has
         nothing to render, causing a long blank screen on slow connections.
         React replaces this on mount. Plain text only — an <img> here makes
         Safari hold first paint until the image arrives. -->
    <div id="root">
      <div style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #f5f5f4; font-family: -apple-system, system-ui, sans-serif; color: #a8a29e; font-size: 16px;">
        Processing&hellip;
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
